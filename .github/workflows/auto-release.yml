# Automatically publish a patch release after main receives new code.
name: auto-release

on:
  push:
    branches:
      - main

permissions:
  contents: write # create the GitHub Release + assets and push the generated v* tag

defaults:
  run:
    shell: bash

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  release:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Create next patch tag
        id: version
        run: |
          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
          if [[ -z "$latest" ]]; then
            next="v0.1.0"
          else
            version="${latest#v}"
            IFS=. read -r major minor patch <<< "$version"
            next="v${major}.${minor}.$((patch + 1))"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$next" -m "chore(release): $next"
          git push origin "$next"
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "version=${next#v}" >> "$GITHUB_OUTPUT"
          echo "Created $next"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to DuckInAShirt/homebrew-tap, so GoReleaser
          # can push the formula across repos (GITHUB_TOKEN can't).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Check npm token
        id: token
        run: |
          if [[ -n "${NODE_AUTH_TOKEN}" ]]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "NPM_TOKEN is not configured; skipping npm publish."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check npm version
        id: npm_version
        if: steps.token.outputs.has_token == 'true'
        working-directory: npm
        run: |
          version="${{ needs.release.outputs.version }}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if npm view "@duckinashirt/leetmate@$version" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "@duckinashirt/leetmate@$version already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test npm package
        if: steps.token.outputs.has_token == 'true' && steps.npm_version.outputs.exists == 'false'
        working-directory: npm
        run: |
          npm version "${{ steps.npm_version.outputs.version }}" --no-git-tag-version
          npm test
          npm pack --dry-run

      - name: Publish npm package
        if: steps.token.outputs.has_token == 'true' && steps.npm_version.outputs.exists == 'false'
        working-directory: npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
