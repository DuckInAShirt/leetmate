# Build & publish releases on tag push (v*).
# Tag locally: `git tag v0.1.0 && git push origin v0.1.0`
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for changelog generation

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to DuckInAShirt/homebrew-tap, so GoReleaser
          # can push the formula across repos (GITHUB_TOKEN can't).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Check npm token
        id: token
        run: |
          if [[ -n "${NODE_AUTH_TOKEN}" ]]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "NPM_TOKEN is not configured; skipping npm publish."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check npm version
        id: npm_version
        if: steps.token.outputs.has_token == 'true'
        working-directory: npm
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if npm view "@zxr55555/leetmate@$version" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "@zxr55555/leetmate@$version already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test npm package
        if: steps.token.outputs.has_token == 'true' && steps.npm_version.outputs.exists == 'false'
        working-directory: npm
        run: |
          npm version "${{ steps.npm_version.outputs.version }}" --no-git-tag-version
          npm test
          npm pack --dry-run

      - name: Publish npm package
        if: steps.token.outputs.has_token == 'true' && steps.npm_version.outputs.exists == 'false'
        working-directory: npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
